<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Car Rental System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Car Rental System</h1>

    <h2>Auto Toevoegen</h2>
    <form id="autoForm">
        <div class="input-group">
            <label for="merk">Merk:</label>
            <input type="text" id="merk" required placeholder="Bijv. Tesla">
        </div>

        <div class="input-group">
            <label for="model">Model:</label>
            <input type="text" id="model" required placeholder="Bijv. Model 3">
        </div>

        <button type="submit">Auto Toevoegen</button>
        <p id="boodschap"></p>
    </form>

    <hr>

    <h2>Voertuigen Zoeken</h2>
    <div class="input-group" style="max-width: 500px; margin-bottom: 30px;"></div>
        <input type="text" id="zoekBalk" placeholder="Type een merk of model om live te zoeken...">
    </div>

    <h2>Beschikbare Voertuigen</h2>
    <div id="autoLijst">
        <!-- Javascript bouwt hier de .auto-card elementen op -->
    </div>


    <script src="classes/car.js"></script>
    <script src="classes/user.js"></script>
    <script src="classes/customer.js"></script>
    <script src="classes/admin.js"></script>
    <script src="classes/rentalSystem.js"></script>

    <script src="script.js"></script>

</body>
</html>
